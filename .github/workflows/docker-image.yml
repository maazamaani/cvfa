name: Docker Image CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: maazamaani/cvfa

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            echo "Docker Hub login attempt ${attempt}/5..."
            if echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin; then
              echo "Docker Hub login succeeded."
              exit 0
            fi
            echo "Docker Hub login failed, waiting 30s before retry..."
            sleep 30
          done
          echo "Docker Hub login failed after 5 attempts."
          exit 1

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_PRIMARY_COLOR=${{ vars.NEXT_PUBLIC_PRIMARY_COLOR || '#007c6f' }}
